        // Мобильный toggle: показываем/прячем snap-панель как bottom sheet.
        // CSS сам отвечает за display кнопки через @media (max-width: 768px), (orientation: landscape) and (max-height: 600px).
        const snapIsNarrow = () => window.matchMedia('(max-width: 768px), (orientation: landscape) and (max-height: 600px)').matches;
        const snapToggleBtn = document.createElement('button');
        snapToggleBtn.id = 'snap-toggle';
        snapToggleBtn.innerHTML = '⚙ Привязки';
        document.body.appendChild(snapToggleBtn);
        snapToggleBtn.addEventListener('click', () => {
            panel.classList.toggle('sp-open');
            snapToggleBtn.textContent = panel.classList.contains('sp-open') ? '✕ Закрыть' : '⚙ Привязки';
        });
        // Клик вне панели на мобильных — закрыть sheet
        document.addEventListener('click', (e) => {
            if (!snapIsNarrow()) return;
            if (!panel.classList.contains('sp-open')) return;
            if (panel.contains(e.target)) return;
            if (snapToggleBtn.contains(e.target)) return;
            panel.classList.remove('sp-open');
            snapToggleBtn.textContent = '⚙ Привязки';
        });

        // Конструкция через :checked + .sp-bg / + .sp-knob управляется CSS,
        // но первое состояние чекбокса уже задано через атрибут checked.
        // Этот обработчик оставлен на случай ручного sync (например, после смены snapState из JS).
        function refreshPanelToggleUI(key) {
            const cb = document.getElementById(`snap-${key}`);
            if (cb) cb.checked = snapState[key];
        }

        document.getElementById('snap-position').addEventListener('change', (e) => {
            snapState.position = e.target.checked;
            refreshPanelToggleUI('position');
            if (!snapState.position) {
                clearGuides();
                hideSnapHint();
            }
        });
        document.getElementById('snap-angle').addEventListener('change', (e) => {
            snapState.angle = e.target.checked;
            refreshPanelToggleUI('angle');
            applyAngleSnapToAll();
        });
        document.getElementById('snap-showHint').addEventListener('change', (e) => {
            snapState.showHint = e.target.checked;
            refreshPanelToggleUI('showHint');
            if (!snapState.showHint) hideSnapHint();
        });

        // Применяем начальный snap угла к уже существующим текстбоксам
        applyAngleSnapToAll();

        // ESC — мгновенно убирает направляющие и подсказку.
        // Delete / Backspace — удаляет активный текстбокс, кроме режима редактирования.
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                clearGuides();
                hideSnapHint();
                return;
            }
            if (e.key !== 'Delete' && e.key !== 'Backspace') return;
            // Не вмешиваемся в системные комбинации и редактирование текста.
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            const active = canvas.getActiveObject();
            if (!active) return;
            if (active.isEditing) return;
            e.preventDefault();
            canvas.remove(active);
            canvas.requestRenderAll();
        });

        // На каждом перемещении объекта применяем snap (или очищаем, если выключен)
        canvas.on('object:moving', (e) => {
            const obj = e.target;
            if (!obj || obj.__guide) return;
            if (snapState.position) {
                applySnap(obj);
            } else {
                clearGuides();
                hideSnapHint();
            }
            // После возможного snap (или без него) синхронизируем позицию
            // подсказки с текущим положением объекта. Без этого хинт
            // остаётся в точке снапа, а объект уезжает дальше — выглядит
            // так, будто подсказка «убегает» от объекта. Особенно заметно
            // в книжной ориентации, где канва шире viewport и объект
            // легко увести на 100+ px вбок.
            if (snapHint && snapHint.style.display !== 'none') {
                positionSnapHint(obj);
            }
        });

        // Снимаем панель привязки при НАЧАЛЕ новой транзакции (клик/тап),
        // чтобы хинт от предыдущего перетаскивания не залипал на экране.
        canvas.on('mouse:down', () => {
            hideSnapHint();
            clearGuides();
        });
        canvas.on('mouse:up', () => {
            clearGuides();
            hideSnapHint();
        });
        canvas.on('selection:cleared', () => {
            clearGuides();
            hideSnapHint();
        });

        // ============================================================
        // ПАНЕЛЬ ЛОГОТИПОВ (загрузка из images/logos/manifest.json)
        // ============================================================
        let logoManifest = [];

        function addLogoFromManifest(logo) {
            fabric.Image.fromURL(`images/logos/${logo.file}`, (img) => {
                if (!img) {
                    console.warn('Не удалось загрузить логотип:', logo.file);
                    return;
                }
                // Цель — ~ 80 px по большей стороне (логотипы добавляются в свободное место тестового холста)
                const target = 80;
                const aspect = img.width / img.height;
                let w, h;
                if (aspect >= 1) { w = target; h = target / aspect; }
                else { h = target; w = target * aspect; }
                const scale = w / img.width;

                img.set({
                    left: canvas.getWidth() / 2,
                    top: canvas.getHeight() / 2,
                    originX: 'center',
                    originY: 'center',
                    scaleX: scale,
                    scaleY: scale
                });
                canvas.add(img);
                canvas.setActiveObject(img);
                canvas.requestRenderAll();
            }, { crossOrigin: 'anonymous' });
        }

        async function initLogoPanel() {
            const panel = document.createElement('div');
            panel.id = 'logo-panel';
            panel.innerHTML = `
                <div class="lp-header">🏭 Логотипы</div>
                <div class="lp-search">
                    <input type="text" placeholder="🔍 Поиск по бренду..." autocomplete="off">
                </div>
                <div class="lp-filters">
                    <button class="lp-filter-btn active" data-filter="all">Все</button>
                    <button class="lp-filter-btn" data-filter="badge">Значки</button>
                    <button class="lp-filter-btn" data-filter="text">С надп.</button>
                </div>
                <div class="lp-grid">
                    <div class="lp-loading">⏳ Загрузка манифеста…</div>
                </div>
            `;
            document.body.appendChild(panel);

            // Мобильный toggle: показываем/прячем панель-нижний sheet.
            // CSS сам отвечает за display кнопки через @media (max-width: 768px), (orientation: landscape) and (max-height: 600px).
            const isNarrow = () => window.matchMedia('(max-width: 768px), (orientation: landscape) and (max-height: 600px)').matches;
            const toggleBtn = document.createElement('button');
            toggleBtn.id = 'logo-toggle';
            toggleBtn.innerHTML = '☰ Логотипы';
            document.body.appendChild(toggleBtn);
            toggleBtn.addEventListener('click', () => {
                panel.classList.toggle('lp-open');
                toggleBtn.textContent = panel.classList.contains('lp-open') ? '✕ Закрыть' : '☰ Логотипы';
            });
            // Клик вне панели на мобильных — закрыть sheet
            document.addEventListener('click', (e) => {
                if (!isNarrow()) return;
                if (!panel.classList.contains('lp-open')) return;
                if (panel.contains(e.target)) return;
                if (toggleBtn.contains(e.target)) return;
                panel.classList.remove('lp-open');
                toggleBtn.textContent = '☰ Логотипы';
            });

            // Свайп вниз за верхнее ребро (шапку) — закрыть sheet.
            attachSwipeDownToDismiss(panel, '.lp-header', 'lp-open', () => {
                panel.classList.remove('lp-open');
                toggleBtn.textContent = '☰ Логотипы';
            });

            const grid = panel.querySelector('.lp-grid');
            const searchInput = panel.querySelector('.lp-search input');
            const filterBtns = panel.querySelectorAll('.lp-filter-btn');

            let currentFilter = 'all';
            let searchQuery = '';

            const renderGrid = () => {
                let items = [...logoManifest];
                if (currentFilter !== 'all') {
                    items = items.filter(l => l.type === currentFilter);
                }
                const q = searchQuery.toLowerCase();
                if (q) {
                    items = items.filter(l =>
                        (l.brand || '').toLowerCase().includes(q) ||
                        (l.label || '').toLowerCase().includes(q)
                    );
                }

                if (items.length === 0) {
                    grid.innerHTML = '<div class="lp-empty">Ничего не найдено</div>';
                    return;
                }

                // Группируем по бренду
                const grouped = {};
                items.forEach(l => {
                    if (!grouped[l.brand]) grouped[l.brand] = [];
                    grouped[l.brand].push(l);
                });
                const brands = Object.keys(grouped).sort();

                grid.innerHTML = '';
                brands.forEach(brand => {
                    const groupTitle = document.createElement('div');
                    groupTitle.className = 'lp-brand-title';
                    groupTitle.textContent = brand.toUpperCase();
                    grid.appendChild(groupTitle);

                    const brandGrid = document.createElement('div');
                    brandGrid.className = 'lp-brand-grid';

                    grouped[brand].forEach(logo => {
                        const btn = document.createElement('button');
                        btn.className = 'lp-logo-btn';
                        btn.title = logo.label;
                        btn.dataset.file = logo.file;

                        // Подгружаем превью
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.src = `images/logos/${logo.file}`;
                        img.onload = () => {
                            const c = document.createElement('canvas');
                            c.width = 64;
                            c.height = 64;
                            const cx = c.getContext('2d');
                            const aspect = img.width / img.height;
                            let dw = 56, dh = 56;
                            if (aspect > 1) dh = 56 / aspect;
                            else dw = 56 * aspect;
                            cx.clearRect(0, 0, 64, 64);
                            cx.drawImage(img, (64 - dw) / 2, (64 - dh) / 2, dw, dh);
                            btn.appendChild(c);
                        };
                        img.onerror = () => {
                            btn.textContent = '—';
                        };

                        btn.addEventListener('click', () => {
                            addLogoFromManifest(logo);
                            // На мобильных закрываем sheet после добавления логотипа
                            const wasOpen = panel.classList.contains('lp-open');
                            if (wasOpen) {
                                panel.classList.remove('lp-open');
                                toggleBtn.textContent = '☰ Логотипы';
                            }
                        });
                        brandGrid.appendChild(btn);
                    });

                    grid.appendChild(brandGrid);
                });
            };

            // Загружаем манифест
            try {
                const resp = await fetch('images/logos/manifest.json');
                if (!resp.ok) throw new Error('Манифест не найден');
                const data = await resp.json();
                logoManifest = data.logos || [];
                if (logoManifest.length === 0) {
                    grid.innerHTML = '<div class="lp-empty">Логотипы не найдены</div>';
                    return;
                }
                renderGrid();
            } catch (e) {
                console.error('Ошибка загрузки манифеста логотипов:', e);
                grid.innerHTML = '<div class="lp-empty">❌ Ошибка загрузки манифеста</div>';
                return;
            }

            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.trim();
                renderGrid();
            });

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderGrid();
                });
            });
        }

        initLogoPanel();

        // ============================================================
        // ПАНЕЛЬ ТЕКСТА И ШРИФТОВ (только fonts/backpanel)
        // ============================================================
        const FONT_OPTIONS = [
            { name: 'Inter', family: 'Panel Inter' },
            { name: 'Montserrat', family: 'Panel Montserrat' },
            { name: 'Raleway', family: 'Panel Raleway' },
            { name: 'Roboto', family: 'Panel Roboto' },
            { name: 'Noto Serif', family: 'Panel Noto Serif' },
            { name: 'Caveat', family: 'Panel Caveat' },
            { name: 'Bad Script', family: 'Panel Bad Script' },
            { name: 'Gogol', family: 'Panel Gogol' },
            { name: 'Brusnika', family: 'Panel Brusnika' },
            { name: 'LeoHand', family: 'Panel LeoHand' },
            { name: 'Everlasting', family: 'Panel Everlasting' },
            { name: 'Resphekt', family: 'Panel Resphekt' },
            { name: 'Margot Xtrafette', family: 'Panel Margot' },
            { name: 'Fowviel', family: 'Panel Fowviel' },
            { name: 'Bravo', family: 'Panel Bravo' },
            { name: 'Marta', family: 'Panel Marta' },
            { name: 'Troika', family: 'Panel Troika' },
            { name: 'Sprite Graffiti', family: 'Panel Sprite Graffiti' }
        ];
        const SIGNATURE_TEXT = 'Ваша красивая подпись';

        async function addTextWithFont(font) {
            await document.fonts.load(`40px "${font.family}"`, SIGNATURE_TEXT);
            const textbox = new fabric.Textbox(SIGNATURE_TEXT, {
                left: PLATE_WIDTH / 2,

                originX: 'center',
                originY: 'center',

        async function initFontPanel() {
            await Promise.all(FONT_OPTIONS.map((font) =>
                document.fonts.load(`22px "${font.family}"`, SIGNATURE_TEXT)
            ));

            const fontPanel = document.createElement('div');
            fontPanel.id = 'font-panel';

                <div class="fp-header">Текст и шрифты</div>

        initFontPanel();

        // ============================================================
        // Канал с editor.html: отдаём снимок канвы по запросу.
        // Чёрный фон вокруг плашки — это часть дизайна (видимая «рамка»,
        // как у номера на передней стороне), поэтому в PNG сохраняем
        // backgroundColor как есть.
        // ============================================================
        (function attachRearChannel() {
            if (typeof BroadcastChannel === 'undefined') return;
            const channel = new BroadcastChannel('brelok-rear');
            channel.addEventListener('message', (event) => {
                const data = event.data;
                if (!data || data.type !== 'rear-snapshot-request') return;
                try {
                    const lower = canvas.lowerCanvasEl;
                    canvas.renderAll();
                    const dataURL = lower ? lower.toDataURL('image/png') : canvas.toDataURL('image/png');
                    channel.postMessage({ type: 'rear-snapshot', dataURL });
                } catch (e) {
                    console.warn('Не удалось отдать снимок канвы:', e);
                }
            });
        })();

        // ============================================================
        // Кнопка «Создать макет» — проксирует клик в editor.html через канал.
        // Если editor.html не открыт, кнопка остаётся видимой, но клик подсказывает
        // пользователю открыть редактор.
        // ============================================================
        (function attachCreateMaket() {
            const btn = document.getElementById('create-maket');
            if (!btn) return;
            const channel = (typeof BroadcastChannel !== 'undefined') ? new BroadcastChannel('brelok-maket') : null;
            const toast = document.getElementById('maket-toast');
            let ready = false;
            let toastTimer = null;

            function showToast(text, isError) {
                if (!toast) return;
                toast.textContent = text;
                toast.classList.toggle('mt-error', Boolean(isError));
                toast.classList.add('mt-show');
                if (toastTimer) clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.classList.remove('mt-show');
                    toastTimer = null;
                }, 2200);
            }

            if (channel) {
                channel.addEventListener('message', (event) => {
                    const data = event.data;
                    if (!data) return;
                    if (data.type === 'editor-ready') {
                        ready = true;
                        btn.disabled = false;
                        if (pollHandle) {
                            clearInterval(pollHandle);
                            pollHandle = null;
                        }
                    } else if (data.type === 'maket-result') {
                        showToast(
                            data.success ? '✅ Макет отправлен' : '⚠️ Не удалось отправить макет',
                            !data.success
                        );
                    }
                });
            }

            btn.addEventListener('click', () => {
                if (!channel) {
                    alert('Откройте editor.html, чтобы создать макет');
                    return;
                }
                if (!ready) {
                    alert('Откройте editor.html, чтобы создать макет');
                    return;
                }
                // Анимация: на 1.2с превращаем кнопку в «Отправка...»
                const original = btn.textContent;
                btn.textContent = '⏳ Отправка...';
                btn.disabled = true;
                showToast('⏳ Отправляю макет...', false);
                channel.postMessage({ type: 'rear-create-maket' });
                setTimeout(() => {
                    btn.textContent = original;
                    btn.disabled = false;
                }, 1200);
            });

            // Изначально кнопка неактивна, пока editor.html не объявит о себе.
            btn.disabled = true;

            // Если editor.html открыли до test.html, его первоначальный editor-ready
            // ушёл в пустоту. Опрос каждые 500 мс (макс. 30 с) принудительно «будит»
            // editor.html, который отвечает editor-ready на editor-query.
            let pollHandle = null;
            if (channel) {
                let attempts = 0;
                pollHandle = setInterval(() => {
                    if (ready || attempts >= 60) {
                        clearInterval(pollHandle);
                        pollHandle = null;
                        return;
                    }
                    attempts++;
                    channel.postMessage({ type: 'editor-query' });
                }, 500);
            }
        })();

        // Финальный пересчёт размеров канвы — после применения фона и лого-панели
        // (могут измениться layout / отступы).
        requestAnimationFrame(fitCanvasToViewport);
        window.addEventListener('load', fitCanvasToViewport);

        canvas.requestRenderAll();
    </script>
</body>
</html>
