<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e1e2f">
    <link rel="icon" href="icon.png" type="image/png">
    <title>Страница не найдена · 404</title>

    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/landing.css">
    <style>
        /* === Токены для страницы ошибки ===
           Расширяем переменные landing.css, не переопределяя их.
           Цвета подобраны в той же палитре (blue/violet), что и акценты
           в landing.css (#667eea) и dark-theme.css (#a0b0ff). */
        :root {
            --err-accent: #667eea;
            --err-accent-2: #ec4899;
            --err-warn: #f87171;
            --err-warn-bg: rgba(248, 113, 113, 0.12);
            --err-warn-border: rgba(248, 113, 113, 0.32);
            --err-muted: var(--landing-hint, #6b6b7a);
            --err-title: var(--landing-title, #2c2c3a);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --err-accent: #a0b0ff;
                --err-warn: #fca5a5;
                --err-warn-bg: rgba(248, 113, 113, 0.16);
                --err-warn-border: rgba(248, 113, 113, 0.4);
            }
        }

        /* === Подгоняем лендинг-фон под error-страницу.
           .landing уже навешивает фон и ::before-вуаль,
           просто наследуем всё через тот же класс. === */
        .landing.error {
            align-items: center;
        }

        /* === Карточка-контейнер (стеклянная поверхность, как на лендинге) === */
        .err-card {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            text-align: center;
            background: var(--landing-surface);
            border: 1px solid var(--landing-surface-border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 22px;
            box-shadow: var(--landing-shadow);
            padding: 2.75rem 2rem 2.25rem;
            max-width: 560px;
            width: 100%;
            color: var(--err-title);
            overflow: hidden;
        }

        /* Декоративная «световая» полоска сверху карточки — мягкий градиент,
           который намекает, что приложение живо, несмотря на ошибку. */
        .err-card::before {
            content: "";
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            height: 3px;
            background: linear-gradient(90deg,
                var(--err-accent) 0%,
                var(--err-accent-2) 50%,
                var(--err-warn) 100%);
            opacity: 0.85;
            border-top-left-radius: 22px;
            border-top-right-radius: 22px;
        }

        /* === Гигантская "404" с лёгкой анимацией "покачивания".
           Тонкая 3D-тень и градиент — без перегруза. === */
        .err-code {
            font-family: 'LandingFont', 'Segoe UI', Arial, sans-serif;
            font-weight: 700;
            font-size: clamp(5.5rem, 18vw, 9rem);
            line-height: 1;
            letter-spacing: -0.04em;
            margin: 0;
            background: linear-gradient(135deg,
                var(--err-accent) 0%,
                var(--err-accent-2) 60%,
                var(--err-warn) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            filter: drop-shadow(0 6px 18px rgba(102, 126, 234, 0.18));
            animation: err-float 4.5s ease-in-out infinite;
            user-select: none;
        }

        @keyframes err-float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-6px); }
        }

        @media (prefers-reduced-motion: reduce) {
            .err-code { animation: none; }
        }

        /* === Иконка-предупреждение рядом с заголовком === */
        .err-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            color: var(--err-warn);
            background: var(--err-warn-bg);
            border: 1px solid var(--err-warn-border);
            border-radius: 999px;
        }
        .err-badge__dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--err-warn);
            box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.18);
            animation: err-pulse 1.6s ease-in-out infinite;
        }
        @keyframes err-pulse {
            0%, 100% { box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.18); }
            50%      { box-shadow: 0 0 0 8px rgba(248, 113, 113, 0.04); }
        }
        @media (prefers-reduced-motion: reduce) {
            .err-badge__dot { animation: none; }
        }

        /* === Заголовок и поясняющий текст === */
        .err-title {
            font-family: 'LandingFont', 'Segoe UI', Arial, sans-serif;
            font-size: clamp(1.25rem, 3.5vw, 1.65rem);
            font-weight: 700;
            line-height: 1.25;
            color: var(--err-title);
            margin: 0;
            letter-spacing: -0.01em;
        }

        .err-desc {
            font-size: clamp(0.92rem, 2.4vw, 1rem);
            line-height: 1.55;
            color: var(--err-muted);
            margin: 0;
            max-width: 44ch;
        }

        /* === Доп. блок с деталями (код ошибки, путь) — опционально.
           Скрыт, если атрибут пуст (см. JS ниже). === */
        .err-meta {
            width: 100%;
            margin-top: 0.25rem;
            padding: 12px 14px;
            background: rgba(102, 126, 234, 0.08);
            border: 1px dashed rgba(102, 126, 234, 0.32);
            border-radius: 12px;
            font: 600 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            color: var(--err-muted);
            word-break: break-all;
            text-align: left;
        }
        .err-meta[hidden] { display: none; }
        .err-meta b {
            color: var(--err-title);
            font-weight: 700;
        }

        /* === Группа кнопок действий === */
        .err-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 0.5rem;
        }

        .err-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            padding: 11px 20px;
            border-radius: 999px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.1px;
            text-decoration: none;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.15s ease,
                        background 0.18s ease,
                        box-shadow 0.18s ease,
                        border-color 0.18s ease,
                        color 0.18s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* Главная кнопка — градиент в стилистике 404 */
        .err-btn--primary {
            color: #ffffff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 6px 18px rgba(102, 126, 234, 0.35);
        }
        .err-btn--primary:hover,
        .err-btn--primary:focus-visible {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(102, 126, 234, 0.45);
        }
        .err-btn--primary:active { transform: translateY(0) scale(0.98); }

        /* Вторичная — прозрачная, с аккуратной обводкой */
        .err-btn--ghost {
            color: var(--err-title);
            background: transparent;
            border-color: rgba(102, 126, 234, 0.4);
        }
        .err-btn--ghost:hover,
        .err-btn--ghost:focus-visible {
            background: rgba(102, 126, 234, 0.12);
            border-color: var(--err-accent);
        }
        .err-btn--ghost:active { transform: scale(0.98); }

        .err-btn:focus-visible {
            outline: 3px solid var(--err-accent);
            outline-offset: 3px;
        }

        @media (prefers-reduced-motion: reduce) {
            .err-btn,
            .err-btn--primary,
            .err-btn--ghost { transition: none; }
            .err-btn--primary:active,
            .err-btn--ghost:active { transform: none; }
        }

        /* === Подпись внизу карточки — мягкий "хвостик" от бренда === */
        .err-foot {
            margin-top: 0.25rem;
            font-size: 12px;
            color: var(--err-muted);
            letter-spacing: 0.3px;
        }
        .err-foot b { color: var(--err-title); font-weight: 600; }

        /* === Адаптив === */
        @media (max-width: 480px) {
            .err-card {
                padding: 2rem 1.25rem 1.75rem;
                gap: 1rem;
            }
            .err-actions {
                flex-direction: column;
                width: 100%;
            }
            .err-btn { width: 100%; }
        }
    </style>
</head>
<body class="landing error">
    <main class="err-card" role="alert" aria-labelledby="err-title">
        <p class="err-code" aria-hidden="true">404</p>

        <span class="err-badge" aria-hidden="true">
            <span class="err-badge__dot"></span>
            Ошибка навигации
        </span>

        <h1 class="err-title" id="err-title">
            Похоже, эта страница заблудилась
        </h1>

        <p class="err-desc">
            Запрашиваемый адрес не найден или был перемещён.
            Проверьте ссылку или вернитесь на главную — там мы поможем выбрать
            формат номера и продолжить.
        </p>

        <div class="err-meta" id="err-meta" hidden>
            <b>Путь:</b> <span id="err-path">—</span>
        </div>

        <div class="err-actions">
            <a class="err-btn err-btn--primary" href="index.html" aria-label="Перейти на главную">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 11l9-8 9 8"/>
                    <path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"/>
                </svg>
                На главную
            </a>

            <button class="err-btn err-btn--ghost" type="button" id="err-back"
                    aria-label="Вернуться на предыдущую страницу">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
                Назад
            </button>
        </div>

        <p class="err-foot">
            <b>Генератор брелоков</b> · код ошибки 404
        </p>
    </main>

    <script>
        // Подставить запрошенный путь в блок деталей, если страница открыта
        // через HTTP (location.pathname не пустой). Для file:// и корня — прячем.
        (function () {
            var meta = document.getElementById('err-meta');
            var pathEl = document.getElementById('err-path');
            if (!meta || !pathEl) return;

            var path = (window.location && window.location.pathname) || '';
            // Прячем для корня и пустого пути — нечего показывать.
            if (!path || path === '/' || path.indexOf('error.html') !== -1) {
                meta.hidden = true;
                return;
            }
            pathEl.textContent = path;
            meta.hidden = false;
        })();

        // Безопасная кнопка «Назад». Если истории нет (прямой заход) —
        // отправляем на index.html, а не уходим в chrome:// или about:blank.
        (function () {
            var btn = document.getElementById('err-back');
            if (!btn) return;
            btn.addEventListener('click', function () {
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    window.location.href = 'index.html';
                }
            });
        })();
    </script>
</body>
</html>
