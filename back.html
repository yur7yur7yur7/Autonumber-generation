        // Только десктоп — на мобильном CSS прячет плашку полностью.
        // ============================================================
        (function setupEmojiHint() {
            const hint = document.getElementById('emoji-hint');
            if (!hint) return;

            // Определяем ОС и подставляем шорткат. Порядок проверок важен:
            // iPadOS прикидывается Mac (navigator.platform === 'MacIntel'),
            // но на нём работает Win+.-подобный шорткат из виртуальной
            // клавиатуры; для надёжности считаем его «не десктопом» и
            // прячем подсказку ниже отдельной проверкой.
            const ua = navigator.userAgent || '';
            const platform = (navigator.userAgentData?.platform || navigator.platform || '').toLowerCase();
            const isMac = /mac|darwin/i.test(platform) || /Mac OS X/.test(ua);
            const isWin = /win/i.test(platform) || /Windows NT/.test(ua);
            const isLinux = /linux/i.test(platform) && !/android/i.test(ua);

            // На iPadOS / Android подсказка бессмысленна — там нет
            // системной панели эмодзи в том же смысле, что на десктопе.
            const isTabletLike = /iPad|iPhone|iPod|Android/i.test(ua);
            if (isTabletLike) {
                hint.remove();
                return;
            }

            const kbd1 = document.getElementById('eh-kbd-1');
            const kbd2 = document.getElementById('eh-kbd-2');
            if (isMac) {
                // macOS: ⌃⌘Space (Ctrl+Cmd+Space). На маке логичнее показать
                // символы, чем буквы, чтобы сразу считывалось.
                if (kbd1) kbd1.textContent = '⌃⌘';
                if (kbd2) kbd2.textContent = 'Space';
            } else if (isLinux) {
                // Linux: зависит от DE. GNOME — Ctrl+. (точнее Super+. в
                // новых версиях, но Ctrl+. работает шире). Показываем
                // «Ctrl + .», это самый распространённый вариант.
                if (kbd1) kbd1.textContent = 'Ctrl';
                if (kbd2) kbd2.textContent = '.';
            } else {
                // Windows (по умолчанию): Win+. или Win+;
                if (kbd1) kbd1.textContent = 'Win';
                if (kbd2) kbd2.textContent = '.';
            }

            const SEEN_KEY = 'emojiHintSeen';
            let seen = false;
            try { seen = sessionStorage.getItem(SEEN_KEY) === '1'; } catch (_) { /* приватный режим */ }
            if (seen) {
                hint.remove();
                return;
            }

            let hideTimer = null;
            function show() {
                if (hideTimer) clearTimeout(hideTimer);
                hint.classList.add('eh-show');
                // Авто-скрытие через 9 секунд. Не делаем короче — подсказка
                // должна успеть дочитаться, но и не висеть вечно.
                hideTimer = setTimeout(() => dismiss(), 9000);
            }
            // Снять визуально (используется при уходе с back на front, или
            // при ручном закрытии — тогда ещё помечаем как «видели»).
            function dismiss(markSeen) {
                if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
                hint.classList.remove('eh-show');
                if (markSeen) {
                    try { sessionStorage.setItem(SEEN_KEY, '1'); } catch (_) {}
                    seen = true;
                }
            }

            // Показываем подсказку именно тогда, когда юзер вошёл в режим
            // редактирования текстбокса (двойной клик / Enter на выделенном).
            // Только в этот момент шорткат эмодзи осмыслен: курсор стоит
            // в тексте, и пользователь готов печатать. На передней стороне
            // эмодзи не нужны (там ввод цифр номера/региона).
            //
            // Триггер: canvas.on('text:editing:entered') — Fabric 5.x стреляет
            // его на канвасе при входе в edit-mode (см. текстбокс_behavior:
            // canvas.fire('text:editing:entered', {target, e})). Дополнительно
            // проверяем сторону: подсказку показываем только когда мы на back.
            const sideLabel = document.getElementById('canvas-label');
            const isBackSide = () => sideLabel?.dataset?.side === 'back';

            canvas.on('text:editing:entered', () => {
                if (!isBackSide()) return;     // на front не показываем
                if (seen) return;              // уже видели в этой сессии
                show();
            });
            // При выходе из режима редактирования — прячем визуально, но
            // НЕ помечаем как «видели»: пользователь мог просто клик-
            // мимоходом зайти и выйти, не успев прочитать. Тогда при
            // следующем входе подсказка снова всплывёт.
            canvas.on('text:editing:exited', () => dismiss(false));

            // На случай если юзер уйдёт с back на front прямо во время
            // редактирования — подсказка должна исчезнуть. MutationObserver
            // на data-side ловит этот момент. Подсказка остаётся не-
            // помеченной — при возврате на back и новом входе в edit
            // она снова покажется.
            if (sideLabel) {
                new MutationObserver(() => {
                    if (!isBackSide()) dismiss(false);
                }).observe(sideLabel, { attributes: true, attributeFilter: ['data-side'] });
            }

            // Закрытие по крестику — считаем, что пользователь прочитал.
            document.getElementById('eh-close')?.addEventListener('click', () => dismiss(true));

            // Закрытие по Escape — тоже «прочитал». В режиме редактирования
            // текстбокса Escape сам выходит из редактирования и стреляет
            // text:editing:exited, который сам вызовет dismiss(false). Чтобы
            // не было гонки — наш keydown сработает раньше и пометит как
            // прочитанное, что и нужно.
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && hint.classList.contains('eh-show')) dismiss(true);
            });

            // Клик по самой подсказке не должен её закрывать — пользователь
            // может захотеть скопировать шорткат. Закрываем только по
            // клику вне плашки (на канвас / в кнопку), и если плашка не
            // была закрыта за 9с — она уйдёт сама.
            hint.addEventListener('click', (e) => e.stopPropagation());
        })();

        // Дефолтная подпись при загрузке — шрифт Everlasting, текст по центру канвы.
        // Размер побольше, чем при ручном выборе шрифта из панели — это первый
        // и единственный объект на канве при открытии back.html, он должен
        // сразу читаться как пример оформления.
        (async () => {
            const defaultFont = FONT_OPTIONS.find(f => f.name === 'Everlasting')
                || FONT_OPTIONS[FONT_OPTIONS.length - 1];
            await addTextWithFont(defaultFont, { fontSize: 56, width: 720 });
        })();

        // ============================================================
        // Канал с editor.html: отдаём снимок канвы по запросу.
        // Чёрный фон вокруг плашки — это часть дизайна (видимая «рамка»,
        // как у номера на передней стороне), поэтому в PNG сохраняем
        // backgroundColor как есть.
        // ============================================================
        (function attachRearChannel() {
            if (typeof BroadcastChannel === 'undefined') return;
            const channel = new BroadcastChannel('brelok-rear');
            channel.addEventListener('message', (event) => {
                const data = event.data;
                if (!data || data.type !== 'rear-snapshot-request') return;
                // Не отдаём снимок как «заднюю сторону», если сейчас активна передняя.
                // currentSide живёт в модуле js/side-toggle.js; читаем через window-геттер.
                const currentSide = window.__sideToggle?.getCurrentSide?.();
                if (currentSide && currentSide !== 'back') return;
                try {
                    const lower = canvas.lowerCanvasEl;
                    canvas.renderAll();
                    const dataURL = lower ? lower.toDataURL('image/png') : canvas.toDataURL('image/png');
                    channel.postMessage({ type: 'rear-snapshot', dataURL });
                } catch (e) {
                    console.warn('Не удалось отдать снимок канвы:', e);
                }
            });
        })();

        // ============================================================
        // Кнопка «Посмотреть результат» — обработчик навешивается отдельным
        // модулем ниже. Здесь ничего не блокируем: вся логика локальная, и
        // ждать готовности editor.html больше не требуется.
        // ============================================================

        // Финальный пересчёт размеров канвы — после применения фона и лого-панели
        // (могут измениться layout / отступы).
        requestAnimationFrame(fitCanvasToViewport);
        window.addEventListener('load', fitCanvasToViewport);

        canvas.requestRenderAll();

        // Инициализируем тоггл передней/задней стороны.
        // Импорт динамический — модуль side-toggle.js сам подтянет
        // drawing-front.js + drawing-utils.js при первом показе передней.
        import('./js/side-toggle.js').then(({ initSideToggle }) => {
            initSideToggle({
                canvas,
                sideLabel: document.getElementById('canvas-label'),
                frontCanvas: document.getElementById('frontCanvas'),
                frontCanvasWrap: document.getElementById('front-canvas-wrap'),
                frontPlateInput: document.getElementById('frontPlateInput'),
                getFrontRect: () => frontRect,
                fitCanvasToViewport
            });
        });
    </script>
    <script type="module" src="js/result-preview.js"></script>
    <script type="module">
        import { openResultPreview } from './js/result-preview.js';
        import { openOrderForm } from './js/order-form.js';
        import { openThanksModal } from './js/thanks-modal.js';
        import { buildMaketSvg, sendMaketToTelegram, composeMaketPngDataURL } from './js/download.js';
        import {
            serializeBrelokConfig, applyBrelokConfig,
            downloadConfig, parseConfigFile, buildConfigFilename,
        } from './js/brelok-config.js';

        const btn = document.getElementById('create-maket');
        if (!btn) {
            console.warn('Кнопка #create-maket не найдена');
        } else {
            // Разблокируем сразу: вся логика — локальная, editor.html больше
            // не требуется (его планируется выпилить из проекта).
            btn.disabled = false;

            const toast = document.getElementById('maket-toast');
            let toastTimer = null;

            function showToast(text, isError) {
                if (!toast) return;
                toast.textContent = text;
                toast.classList.toggle('mt-error', Boolean(isError));
                toast.classList.add('mt-show');
                if (toastTimer) clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.classList.remove('mt-show');
                    toastTimer = null;
                }, 2200);
            }

            function getFrontDataURL() {
                // Перед снятием снимка просим side-toggle принудительно
                // перерисовать переднюю сторону — если пользователь ни разу
                // не переключался на front, frontCanvas пуст.
                window.__sideToggle?.ensureFrontRendered?.();
                const frontCanvas = document.getElementById('frontCanvas');
                return frontCanvas ? frontCanvas.toDataURL('image/png') : null;
            }

            btn.addEventListener('click', async () => {
                const original = btn.textContent;
                btn.textContent = '⏳ Готовлю...';
                btn.disabled = true;
                try {
                    const frontDataURL = getFrontDataURL();
                    const backDataURL = window.__sideToggle?.getRearSnapshot?.() ?? null;

                    await openResultPreview({
                        frontDataURL,
                        backDataURL,
                        onSendToPrint: async () => {
                            // Сначала — форма заказа (имя, контакт, комментарий).
                            // Если пользователь нажал «Отмена» или закрыл — отмены
                            // отправки, чтобы не слать макет без данных.
                            const order = await openOrderForm();
                            if (!order) return false;
                            // Собираем SVG напрямую через buildMaketSvg и шлём в Telegram-реле.
                            // Номер и регион берём из frontPlateInput (обновляется
                            // через onPlateChange в js/side-toggle.js), иначе в
                            // подписи оператор видит пустые поля.
                            const { number, region } = window.__sideToggle?.getPlate?.() ?? {};
                            const result = buildMaketSvg({
                                frontDataURL,
                                backDataURL,
                                number: number || '',
                                region: region || '',
                            });
                            // Снимаем снимок дизайна брелка (если был загружен
                            // конфиг — он уже применён, сериализация отразит его).
                            // Если fabric.Canvas ещё не инициализирован (юзер
                            // ни разу не был на back) — шлём без config.
                            let brelokCfg = null;
                            try {
                                if (window.__backCanvas) {
                                    brelokCfg = serializeBrelokConfig(window.__backCanvas);
                                }
                            } catch (e) {
                                console.warn('serializeBrelokConfig:', e);
                            }
                            // Тестовая кнопка-заглушка в order-form.js помечает
                            // payload флагом __test. В этом режиме мы НЕ шлём
                            // данные в Telegram-бота (чтобы не засорять прод),
                            // но имитируем успех — открываем thanks-модалку как
                            // при обычной отправке. Это позволяет отладить поток
                            // модалок (preview → order → thanks) без боевых запросов.
                            const isTest = order.__test === true;
                            const ok = isTest
                                ? true
                                : await sendMaketToTelegram(result, order, brelokCfg);
                            showToast(
                                isTest
                                    ? '🧪 Тестовая отправка (в Telegram не отправлено)'
                                    : ok
                                        ? '✅ Макет отправлен'
                                        : '⚠️ Не удалось отправить макет',
                                !ok
                            );
                            // После успешной отправки сразу открываем модалку
                            // благодарности с контактами производителя. Делаем
                            // fire-and-forget: НЕ await-им, чтобы preview-модалка
                            // закрылась раньше (return ok ниже) и не висела
                            // вместе с thanks-модалкой. thanks-modal закрывается
                            // только пользователем (требование: висит, пока не
                            // закроет).
                            if (ok) {
                                openThanksModal().catch((err) =>
                                    console.error('thanks modal:', err)
                                );
                            }
                            return ok;
                        },
                        // Клик по карману — переключаем редактор на нужную сторону.
                        // Модалка сама закрывается после клика (см. onClose: finish
                        // в js/result-preview.js). Используем setSide через глобальный
                        // хук side-toggle — он же учитывает, что мы уже на этой
                        // стороне (no-op).
                        onSelectFront: () => window.__sideToggle?.setSide?.('front'),
                        onSelectBack: () => window.__sideToggle?.setSide?.('back'),
                    });
                } catch (e) {
                    console.error('preview error:', e);
                    showToast('⚠️ Ошибка при подготовке макета', true);
                } finally {
                    btn.textContent = original;
                    btn.disabled = false;
                }
            });

            // ===== DEBUG: кнопка «🧪 Скачать PNG» — только для отладки.
            // Собирает ИТОГОВЫЙ PNG (тот же, что composeMaketPngDataURL
            // отдаёт в Telegram как файл) и скачивает его. После тестов —
            // удалить кнопку, обработчик и CSS.
            const dbgBtn = document.getElementById('debug-download-png');
            if (dbgBtn) {
                dbgBtn.disabled = false;
                dbgBtn.addEventListener('click', async () => {
                    const original = dbgBtn.textContent;
                    dbgBtn.textContent = '⏳ ...';
                    dbgBtn.disabled = true;
                    try {
                        const frontDataURL = getFrontDataURL();
                        const backDataURL = window.__sideToggle?.getRearSnapshot?.() ?? null;
                        const png = await composeMaketPngDataURL(frontDataURL, backDataURL);
                        if (!png) {
                            showToast('⚠️ Не удалось собрать PNG', true);
                            return;
                        }
                        // Имя файла — как в sendMaketToTelegram (brelok-<номер><регион>.png).
                        const { number, region } = window.__sideToggle?.getPlate?.() ?? {};
                        const nn = (number || '').trim();
                        const rr = (region || '').trim();
                        const filename = (nn || rr) ? `brelok-${nn}${rr}.png` : 'brelok.png';
                        downloadDataURL(png, filename);
                        showToast('✅ PNG скачан');
                    } catch (e) {
                        console.error('debug download:', e);
                        showToast('⚠️ Ошибка скачивания', true);
                    } finally {
                        dbgBtn.textContent = original;
                        dbgBtn.disabled = false;
                    }
                });
            }

            function downloadDataURL(dataURL, filename) {
                const a = document.createElement('a');
                a.href = dataURL;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
            }

            // ============================================================
            // ИМПОРТ / ЭКСПОРТ КОНФИГА БРЕЛКА
            // (js/brelok-config.js + window.__sideToggle.getFrontSnapshot).
            //
            // В back.html нет UI-кнопки «Загрузить макет». Импорт срабатывает
            // автоматически, когда страница открыта с `?config=<key>&type=<brelokType>`
            // на URL. Ключ — это sessionStorage-запись с JSON-текстом,
            // которую положил скрипт на index.html после выбора файла.
            // Тип брелка (сейчас «ru») сверяется с полем cfg.brelokType
            // в applyBrelokConfig — если не совпадает, импорт отклоняется
            // с понятным сообщением.
            //
            // «⬇ Скачать конфиг» — видна только при body.debug, рядом с
            // «🧪 Скачать PNG». Сохраняет текущий дизайн в .json.
            // ============================================================
            const dumpBtn = document.getElementById('download-config-btn');

            function showConfigToast(text, isError = false) {
                // Переиспользуем существующий тост #maket-toast — он уже
                // есть в back.html и обрабатывается CSS (mt-show/mt-error).
                const toast = document.getElementById('maket-toast');
                if (!toast) return;
                toast.textContent = text;
                toast.classList.toggle('mt-error', Boolean(isError));
                toast.classList.add('mt-show');
                const prev = toast._timer;
                if (prev) clearTimeout(prev);
                toast._timer = setTimeout(() => {
                    toast.classList.remove('mt-show');
                }, 2200);
            }

            // Утилита: применяет конфиг из File (parse + apply). Оставлена
            // как переиспользуемая функция на случай, если UI-кнопка загрузки
            // когда-нибудь вернётся в back.html. Сейчас основной поток идёт
            // через ?config=<key>&type=<brelokType> (см. ниже) и использует
            // applyBrelokConfig напрямую.
            async function importConfigFile(file) {
                if (!file) return;
                try {
                    const cfg = await parseConfigFile(file);
                    const canvas = window.__backCanvas;
                    if (!canvas) throw new Error('fabric.Canvas не найден');
                    await applyBrelokConfig(canvas, cfg);
                    showConfigToast('✅ Конфиг загружен');
                    // Подсвечиваем кнопку «📦 Макет» 1.5с, чтобы было видно
                    // affordance: «теперь можно сразу отправить».
                    const maket = document.getElementById('create-maket');
                    if (maket) {
                        maket.classList.add('btn-attention');
                        setTimeout(() => maket.classList.remove('btn-attention'), 1500);
                    }
                } catch (err) {
                    console.error('config import:', err);
                    showConfigToast(`⚠️ Не получилось: ${err.message}`, true);
                }
            }

            if (dumpBtn) {
                dumpBtn.addEventListener('click', () => {
                    try {
                        const canvas = window.__backCanvas;
                        if (!canvas) throw new Error('fabric.Canvas не найден');
                        const cfg = serializeBrelokConfig(canvas);
                        const filename = buildConfigFilename(cfg.frontSide);
                        downloadConfig(cfg, filename);
                        showConfigToast('✅ Конфиг скачан');
                    } catch (err) {
                        console.error('config export:', err);
                        showConfigToast(`⚠️ Ошибка экспорта: ${err.message}`, true);
                    }
                });
            }

            // ===== ?config=<key>&type=<brelokType> — поток с index.html =====
            // Сценарий: пользователь на index нажал «Загрузить макет», выбрал
            // .json-файл, скрипт на index положил JSON-текст в sessionStorage
            // под уникальным ключом и перенаправил сюда. Мы после init читаем
            // JSON, применяем, удаляем ключ.
            //
            // Этот же ключ передаётся через encodeURIComponent, поэтому URI-
            // небезопасных символов в имени ключа (их нет, но всё же) не будет.
            const params = new URLSearchParams(location.search);
            const configKey = params.get('config');
            const incomingType = params.get('type'); // 'ru' сейчас
            if (configKey) {
                const rawText = (function () {
                    try {
                        return sessionStorage.getItem(configKey);
                    } catch (_e) {
                        return null;
                    }
                })();
                // Удаляем ключ СРАЗУ, до init — независимо от результата
                // (успех/ошибка/битый JSON). Хранить его в sessionStorage
                // дольше, чем нужно, смысла нет.
                try { sessionStorage.removeItem(configKey); } catch (_e) { /* no-op */ }

                if (rawText == null) {
                    console.warn('config key missing in sessionStorage:', configKey);
                } else {
                    // Парсинг JSON — чуть раньше, чем дойдём до canvas:
                    // если файл битый, лучше упасть заранее с понятной ошибкой.
                    let cfg;
                    try {
                        cfg = JSON.parse(rawText);
                    } catch (e) {
                        console.error('config parse failed:', e);
                        showConfigToast('⚠️ Файл конфига повреждён', true);
                    }
                    if (cfg && typeof cfg === 'object') {
                        // Проверим тип. Если прислали type=ru, а в JSON
                        // brelokType=moto — applyBrelokConfig в любом случае
                        // бросит. Дополнительно мы уже знаем, что открыли
                        // страницу с type=ru, поэтому шлём это как
                        // expectedType, чтобы несоответствующие конфиги
                        // отклонялись с понятным тостом.
                        // Если incomingType не задан — applyBrelokConfig
                        // использует дефолт 'ru' (см. config.js).
                        function waitFor(predicate, cb, attempts = 60) {
                            if (predicate()) return cb();
                            if (attempts <= 0) return;
                            setTimeout(() => waitFor(predicate, cb, attempts - 1), 100);
                        }
                        waitFor(
                            () => window.__sideToggle && window.__backCanvas,
                            () => {
                                // Оборачиваем в JSON-объект с полем text, потому
                                // что importConfigFile ожидает File. Здесь у нас
                                // не File, а уже распарсенный объект — обходим
                                // importConfigFile и применяем напрямую.
                                (async () => {
                                    try {
                                        await applyBrelokConfig(
                                            window.__backCanvas, cfg, incomingType
                                        );
                                        showConfigToast('✅ Макет загружен');
                                        const maket = document.getElementById('create-maket');
                                        if (maket) {
                                            maket.classList.add('btn-attention');
                                            setTimeout(
                                                () => maket.classList.remove('btn-attention'),
                                                1500
                                            );
                                        }
                                    } catch (err) {
                                        console.error('config apply:', err);
                                        showConfigToast(
                                            `⚠️ Не получилось: ${err.message}`, true
                                        );
                                    }
                                })();
                            }
                        );
                    }
                }
            }
        }

        // ===== СКРЫТЫЕ ТЕСТОВЫЕ КНОПКИ =====
        // Тестовая кнопка «Скачать PNG» в этом файле и «Подтвердить (тест)»
        // в модалке заказа спрятаны от обычных пользователей. Появляются
        // только когда в консоли набран `debug` (или `undebug` чтобы скрыть).
        //
        // Хитрость с консолью: если просто повесить `window.debug = function() {...}`,
        // набор `debug` без скобок в DevTools напечатает исходник функции,
        // а не вызовет её — юзер решит, что «ничего не сработало».
        //
        // Решение: геттер через Object.defineProperty. Любое обращение к
        // `window.debug` (с или без скобок) запускает геттер, который
        // включает кнопки и возвращает строку-подсказку. Идемпотентно —
        // можно набирать много раз.
        const debugAction = () => {
            document.body.classList.add('debug');
            console.info('%c[debug] 🧪 Тестовые кнопки ВКЛ', 'color:#fb923c;font-weight:700');
            console.info('Чтобы скрыть — наберите: undebug');
            return '🧪 Тестовые кнопки видны.';
        };
        const undebugAction = () => {
            document.body.classList.remove('debug');
            console.info('%c[debug] Тестовые кнопки ВЫКЛ', 'color:#9ca3af;font-weight:700');
            return 'Тестовые кнопки скрыты.';
        };
        window.__enableDebugButtons = debugAction;
        window.__disableDebugButtons = undebugAction;
        try {
            Object.defineProperty(window, 'debug', {
                get() { return debugAction; },
                configurable: true,
                enumerable: false,
            });
            Object.defineProperty(window, 'undebug', {
                get() { return undebugAction; },
                configurable: true,
                enumerable: false,
            });
        } catch (e) {
            // Фоллбэк — на всякий случай. Старое присвоение: юзеру придётся
            // набрать debug() со скобками, но хотя бы не упадём.
            window.debug = debugAction;
            window.undebug = undebugAction;
        }
        console.info('%c[debug]', 'color:#fb923c;font-weight:700',
            'Наберите в консоли «debug» чтобы показать тестовые кнопки, «undebug» чтобы скрыть');
    </script>

    <!-- ============================================================
         ONBOARDING GUIDE: ручной запуск и автопоказ при первом заходе.
         Сам модуль (js/onboarding.js) определяет STEPS и повесит
         startGuide()/closeGuide() на window. Здесь — кнопка «?» и
         логика «seen» в localStorage. CSS для overlay живёт в
         <style> выше — Task 3 его добавляет.
         ============================================================ -->
    <script type="module">
        import './js/onboarding.js';

        // Ручной запуск — клик по «?» в header'е.
        document.getElementById('guide-toggle')?.addEventListener('click', () => {
            window.startGuide();
        });

        // Автопоказ при первом заходе. После первого закрытия (любым
        // путём: Esc, мимо, «Пропустить», «Готово») флаг в localStorage
        // не даст показывать снова при обычной загрузке. Повторное
        // ручное открытие через «?» — безусловное.
        const SEEN_KEY = 'brelok-onboarding-seen';
        let seen = false;
        try {
            seen = localStorage.getItem(SEEN_KEY) === '1';
        } catch (e) {
            // localStorage недоступен (privacy-mode) — пропускаем автопоказ.
        }
        if (!seen) {
            // Небольшая задержка, чтобы канва успела отрисоваться и шаги с
            // таргетами реально что-то подсветили.
            setTimeout(() => {
                window.startGuide();
            }, 600);
        }

        // Обёртка над closeGuide — ставит флаг «seen» при первом закрытии.
        const originalClose = window.closeGuide;
        window.closeGuide = function () {
            try { localStorage.setItem(SEEN_KEY, '1'); } catch (_e) {}
            originalClose();
        };
    </script>
</body>
