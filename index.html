<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e1e2f">
    <link rel="icon" href="icon.png" type="image/png">
    <title>Выбери формат номера</title>

    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/landing.css">
    <style>
        /* ============================================================
           ONBOARDING GUIDE — overlay и spotlight
           Дублируются из back.html, поскольку гайд открывается и здесь.
           Без бандлера — лучше иметь два независимых стилевых блока,
           чем тянуть отдельный css-файл ради 70 строк.
           ============================================================ */
        #onboarding-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        #onboarding-overlay .ob-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(8, 10, 18, 0.78);
            pointer-events: auto;
        }
        #onboarding-overlay .ob-card {
            position: relative;
            z-index: 1;
            pointer-events: auto;
            background: #ffffff;
            color: #1f2937;
            border-radius: 16px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
            max-width: 480px;
            width: calc(100% - 32px);
            padding: 24px 28px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        #onboarding-overlay .ob-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        #onboarding-overlay .ob-step-indicator {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #6b7280;
        }
        #onboarding-overlay .ob-close {
            background: transparent;
            border: 0;
            font-size: 28px;
            line-height: 1;
            color: #6b7280;
            cursor: pointer;
            padding: 0 4px;
            border-radius: 6px;
            transition: background-color 0.15s ease, color 0.15s ease;
        }
        #onboarding-overlay .ob-close:hover {
            background: #f3f4f6;
            color: #1f2937;
        }
        #onboarding-overlay .ob-title {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 12px;
            line-height: 1.25;
            color: #0f172a;
        }
        #onboarding-overlay .ob-body {
            font-size: 14px;
            line-height: 1.55;
            color: #374151;
            margin: 0 0 20px;
        }
        #onboarding-overlay .ob-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        #onboarding-overlay .ob-skip {
            background: transparent;
            border: 0;
            color: #6b7280;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
        }
        #onboarding-overlay .ob-skip:hover { background: #f3f4f6; color: #374151; }
        #onboarding-overlay .ob-nav {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
        #onboarding-overlay .ob-prev,
        #onboarding-overlay .ob-next {
            background: #1f2937;
            border: 0;
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 9px 14px;
            border-radius: 8px;
            transition: background-color 0.15s ease, transform 0.05s ease;
        }
        #onboarding-overlay .ob-prev:disabled {
            background: #cbd5e1;
            color: #ffffff;
            cursor: not-allowed;
        }
        #onboarding-overlay .ob-next:hover { background: #0f172a; }
        #onboarding-overlay .ob-prev:not(:disabled):hover { background: #374151; }
        #onboarding-overlay .ob-prev:active,
        #onboarding-overlay .ob-next:active { transform: scale(0.97); }

        .ob-spotlight {
            position: relative;
            z-index: 999;
            outline: 3px solid #667eea !important;
            outline-offset: 4px;
            border-radius: 12px;
            box-shadow: 0 0 0 6px rgba(102, 126, 234, 0.18);
        }

        @media (prefers-color-scheme: dark) {
            #onboarding-overlay .ob-card {
                background: #1f2433;
                color: #e5e7eb;
                box-shadow: 0 24px 64px rgba(0, 0, 0, 0.7);
            }
            #onboarding-overlay .ob-step-indicator { color: #9ca3af; }
            #onboarding-overlay .ob-close { color: #9ca3af; }
            #onboarding-overlay .ob-close:hover { background: #2d3548; color: #e5e7eb; }
            #onboarding-overlay .ob-title { color: #f3f4f6; }
            #onboarding-overlay .ob-body { color: #d1d5db; }
            #onboarding-overlay .ob-skip { color: #9ca3af; }
            #onboarding-overlay .ob-skip:hover { background: #2d3548; color: #e5e7eb; }
            #onboarding-overlay .ob-prev:disabled { background: #475569; }
        }

        @media (max-width: 480px) {
            #onboarding-overlay .ob-card {
                padding: 18px 18px;
            }
            #onboarding-overlay .ob-title { font-size: 18px; }
            #onboarding-overlay .ob-body { font-size: 13px; }
            #onboarding-overlay .ob-footer {
                flex-wrap: wrap;
            }
            #onboarding-overlay .ob-nav { width: 100%; }
            #onboarding-overlay .ob-prev,
            #onboarding-overlay .ob-next { flex: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            #onboarding-overlay .ob-prev,
            #onboarding-overlay .ob-next,
            #onboarding-overlay .ob-close,
            #onboarding-overlay .ob-skip { transition: none; }
            .ob-spotlight { transition: none; }
        }
    </style>
</head>
<body class="landing">
    <div class="landing__inner">
        <h1 class="landing__title">Выбери формат номера</h1>
        <p class="landing__hint">Нажми, чтобы начать</p>

        <button type="button" id="guide-toggle" class="landing-guide-btn"
                aria-label="Открыть инструкцию">?</button>

        <a class="format-card"
           href="back.html"
           aria-label="Номер РФ — открыть генератор">
            <img class="format-card__plate"
                 src="images/plate-ru.png"
                 alt="Российский номер М 123 ММ, регион 777"
                 draggable="false">
            <span class="format-card__label">Номер РФ</span>
            <span class="format-card__hint">Личные легковые, грузовики и прицепы. Не для спецсерий и мото.</span>
        </a>
        <button type="button" class="format-card format-card--config"
                id="load-config-card"
                aria-label="Загрузить свой конфиг">
            <svg class="format-card__plate format-card__plate--config"
                 viewBox="0 0 486 110" xmlns="http://www.w3.org/2000/svg"
                 role="img"
                 aria-label="Загрузить макет брелка">
                <!-- Чёрная плашка-табло, как у настоящего номера РФ.
                     rx=8 совпадает с border-radius .format-card__plate,
                     чтобы внутренний угол идеально прилегал к рамке. -->
                <rect x="0" y="0" width="486" height="110" rx="8" fill="#0a0a0a"/>

                <!-- Иконка: круг со стрелкой вверх. Стрелка — загрузка файла. -->
                <g transform="translate(56 55)">
                    <circle r="30" fill="#1f2937" stroke="#a0b0ff" stroke-width="2"/>
                    <!-- стрелка: вертикальная линия вверх + наконечник -->
                    <path d="M0 12 L0 -16 M-10 -6 L0 -16 L10 -6"
                          stroke="#a0b0ff" stroke-width="4" fill="none"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </g>

                <!-- Текст «Загрузить макет брелка» — справа от иконки.
                     Шрифт Inter (LandingFont), белый, тот же акцентный голубой
                     для визуального параллелизма с hover-эффектом карточки. -->
                <text x="110" y="51"
                      font-family="'LandingFont', 'Segoe UI', Arial, sans-serif"
                      font-size="26" font-weight="700" fill="#ffffff">
                    Загрузить макет брелка
                </text>
                <!-- Подпись под текстом, мелко и приглушённо. -->
                <text x="110" y="78"
                      font-family="'LandingFont', 'Segoe UI', Arial, sans-serif"
                      font-size="13" font-weight="500" fill="#9ca3af">
                    файл .brelok-config.json
                </text>
            </svg>
            <span class="format-card__label">Загрузить макет</span>
            <span class="format-card__hint">Ранее сохранённый в этом же редакторе брелок.</span>
        </button>
        <input type="file" id="config-file-input" accept=".json,application/json" hidden>
    </div>
    <script>
        // ============================================================
        // «Загрузить макет» на index.html → back.html.
        // Поток: клик по карточке → диалог выбора файла → JSON кладётся
        // в sessionStorage под уникальным ключом → window.location переходит
        // на back.html?config=<uuid>&type=ru. Там содержимое подхватывается
        // и применяется сразу после инициализации (без повторного диалога).
        //
        // Используем sessionStorage, а не localStorage: по закрытии вкладки
        // ключ автоматически уходит, ничего не мусорится, нет риска
        // конфликта с долгосрочными пользовательскими данными.
        // ============================================================
        (function () {
            const card = document.getElementById('load-config-card');
            const fileInput = document.getElementById('config-file-input');
            if (!card || !fileInput) return;

            // Тип брелка жёстко зашит в код: на данный момент в проекте
            // существует только один редактор (back.html) и один тип
            // («ru»). Если в будущем появятся другие — каждая карточка
            // index.html будет указывать свой type в href карточки,
            // а здесь читать его из data-type.
            const BRELOK_TYPE = 'ru';

            function uuid() {
                // RFC-4122 совместимо не нужно — криптостойкость не требуется,
                // нужен лишь уникальный ключ в текущей вкладке.
                if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                    return window.crypto.randomUUID();
                }
                return 'b-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
            }

            async function handleFile(file) {
                if (!file) return;
                let text;
                try {
                    text = await file.text();
                } catch (e) {
                    alert('⚠️ Не удалось прочитать файл: ' + e.message);
                    return;
                }
                // Проверим, что это валидный JSON — переход на back.html без
                // валидации выглядел бы непонятно, если пользователь возьмёт
                // не тот файл.
                try {
                    JSON.parse(text);
                } catch (_e) {
                    alert('⚠️ Файл не похож на JSON. Проверьте, что выбран .brelok-config.json.');
                    return;
                }
                const key = 'brelok-pending-' + uuid();
                try {
                    sessionStorage.setItem(key, text);
                } catch (e) {
                    alert('⚠️ Браузер не позволяет сохранить файл. Попробуйте обновить страницу.');
                    console.error('sessionStorage setItem:', e);
                    return;
                }
                // Передаём через query-параметры. ВАЖНО: после успешной загрузки
                // back.html удалит ключ из sessionStorage, чтобы он не висел.
                const url = 'back.html?config=' + encodeURIComponent(key)
                    + '&type=' + encodeURIComponent(BRELOK_TYPE);
                window.location.href = url;
            }

            card.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', async (e) => {
                const file = e.target.files && e.target.files[0];
                // Сбрасываем value, чтобы пользователь мог выбрать тот же
                // файл повторно (change срабатывает только при изменении).
                e.target.value = '';
                await handleFile(file);
            });
        })();
    </script>

    <!-- ============================================================
         Инструкция пользователя. Три набора:
         — 'index' — про лендинг;
         — 'front' — про переднюю сторону в back.html;
         — 'back'  — про заднюю сторону в back.html.
         На лендинге запускаем 'index', в редакторе определяем сторону
         через window.__sideToggle.getCurrentSide().
         ============================================================ -->
    <script type="module">
        import './js/shared/onboarding.js';

        const btn = document.getElementById('guide-toggle');
        if (btn) {
            btn.addEventListener('click', () => {
                window.startGuide('index');
            });
        }

        // Автопоказ при первом заходе — через короткую задержку, чтобы
        // страница успела отрисоваться.
        if (window.shouldAutoShowGuide && window.shouldAutoShowGuide('index')) {
            setTimeout(() => window.startGuide('index'), 500);
        }
    </script>
</body>
</html>
